          type: array
          items:
            $ref: "#/components/schemas/HospitalOption"
        procedimentos:
          type: array
          items:
            $ref: "#/components/schemas/ProcedimentoTemplate"
        temaPadrao:
          type: string
          enum: [light, dark]
          description: Registro (claro/escuro) com que novas páginas de paciente abrem no primeiro acesso. A escolha da própria paciente sempre vence depois.
        prazoAssinaturaDiasAntes:
          type: integer
          minimum: 0
          description: Quantos dias antes da cirurgia o contrato deve estar assinado (padrão da clínica). O Console usa para calcular o prazo e os avisos.
        vencimentoSaldoDiasUteisAntes:
          type: integer
          minimum: 0
          description: Quantos dias úteis antes da cirurgia o saldo pendente vence por padrão. O Console usa para pré-preencher o vencimento do saldo e na dica do campo.
