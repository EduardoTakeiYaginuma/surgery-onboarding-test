          type: string
          minLength: 1
      required:
        - instrucao
    GerarContratoInput:
      type: object
      description: >-
        Gera um rascunho a partir do modelo-base vigente do tipo pedido. Aceita as
        decisões escolhidas no wizard e, opcionalmente, o CORPO já revisado/editado
        pelo operador (etapa "Revisar texto"); quando presente, é persistido como o
        texto do rascunho em vez de resolver o modelo do zero.
      properties:
        tipo:
          $ref: "#/components/schemas/DocumentoTipo"
        corpo:
          type: string
          description: Corpo já revisado (etapa de texto). Ausente = resolver do modelo.
        decisoes:
          type: array
          items:
            $ref: "#/components/schemas/DecisaoRegiaoInput"
      required:
        - tipo
    EditarContratoBody:
      type: object
      properties:
        corpo:
          type: string
          minLength: 1
      required:
        - corpo
    DefinirDecisoesBody:
      type: object
      properties:
        decisoes:
          type: array
          items:
            $ref: "#/components/schemas/DecisaoRegiaoInput"
      required:
        - decisoes
    RevisarPreviaInput:
      type: object
      properties:
        tipo:
          $ref: "#/components/schemas/DocumentoTipo"
        titulo:
          type: string
        corpo:
          type: string
          minLength: 1
      required:
        - tipo
        - titulo
        - corpo
    AprovarContratoBody:
      type: object
      properties:
        aprovadoPor:
          type: string
          minLength: 1
          description: Nome de quem aprova (auditoria da etapa humana obrigatória).
        email:
          type: string
          description: E-mail do signatário (legado, signatário único); sem ele a Autentique usa entrega por link.
        signatarios:
          type: array
          description: >-
            Signatários configurados no envio (contrato: paciente + representante
            legal; termo: paciente + médico). Quando presente, tem precedência
            sobre `email`.
          items:
            $ref: "#/components/schemas/SignatarioInput"
      required:
        - aprovadoPor
    SignatarioInput:
      type: object
      properties:
        papel:
          type: string
          description: "Papel do signatário: paciente | representante | medico."
        nome:
          type: string
          minLength: 1
        email:
          type: string
          description: E-mail do signatário. Vazio = entrega por link (sem e-mail).
      required:
        - papel
        - nome
        - email
