      properties:
        id:
          type: string
        tipo:
          type: string
          enum:
            - linha_do_tempo
            - lista
            - documentos
            - politica
            - contatos
            - texto
            - preparo
            - suspensao_medicamentos
            - preparo_pele
            - receituario_posop
        titulo:
          type: string
        itens:
          type: array
          items:
            type: string
        corpo:
          type: string
        etapas:
          type: array
          items:
            $ref: "#/components/schemas/SecaoEtapa"
        contatos:
          type: array
          items:
            $ref: "#/components/schemas/SecaoContato"
        grupos:
          type: array
          items:
            $ref: "#/components/schemas/SecaoGrupoMedicamentos"
        aviso:
          type: string
        arquivo:
          $ref: "#/components/schemas/SecaoArquivo"
        produtos:
          type: array
          description: preparo_pele — produtos do preparo da pele (nome, instrução, início e tag).
          items:
            $ref: "#/components/schemas/SecaoProduto"
        medicacoes:
          type: array
          description: receituario_posop — medicações do receituário pós-operatório (nome, instrução, via).
          items:
            $ref: "#/components/schemas/SecaoMedicacao"
      required:
        - id
        - tipo
        - titulo
    SecaoMedicacao:
      type: object
      description: receituario_posop — uma medicação do receituário pós-operatório. Todos os campos aceitam variáveis {{...}}.
      properties:
        nome:
          type: string
          description: 'Nome e dose, ex.: "Cefalexina 500mg".'
        instrucao:
          type: string
          description: 'Posologia, ex.: "Tomar 1 comprimido de 6/6 horas por 7 dias".'
        via:
          type: string
          description: 'Via de uso, exibida em itálico entre parênteses, ex.: "Via oral", "Uso ocular".'
      required:
        - nome
        - instrucao
        - via
    SecaoProduto:
      type: object
      description: preparo_pele — um produto do preparo da pele. Todos os campos aceitam variáveis {{...}}.
      properties:
        nome:
          type: string
          description: 'Nome do produto e marca, ex.: "Blancy TX — Mantecorp".'
        instrucao:
          type: string
          description: 'Instrução de uso, ex.: "Aplicar 1 camada na pele à noite, todos os dias".'
        inicio:
          type: string
          description: 'Quando começar, ex.: "Iniciar 10 dias antes da cirurgia".'
        tag:
          type: string
          description: 'Rótulo curto, ex.: "1 frasco · Uso tópico noturno".'
      required:
        - nome
        - instrucao
        - inicio
        - tag
    ConteudoPagina:
