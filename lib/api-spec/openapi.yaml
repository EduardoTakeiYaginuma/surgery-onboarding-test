      responses:
        "200":
          description: Rascunho regerado com as decisões aplicadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Geração não está mais editável
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Não encontrado
          content:
