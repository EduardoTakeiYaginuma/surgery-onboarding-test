      responses:
        "200":
          description: Override removido (volta ao padrão)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConteudoPaciente"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /pacientes/{id}/documentos:
    get:
      operationId: listarDocumentos
      tags: [documentos]
      summary: Listar documentos da paciente
      description: Lista os PDFs anexados à paciente (mais recentes primeiro).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentoPaciente"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
    post:
      operationId: registrarDocumento
      tags: [documentos]
      summary: Registrar documento subido
      description: Registra um PDF já enviado ao armazenamento (via URL pré-assinada) contra a paciente. Só aceita PDF e impõe um limite de tamanho.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrarDocumentoInput"
      responses:
        "201":
          description: Documento registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoPaciente"
        "400":
          description: Tipo inválido ou arquivo muito grande
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/documentos/{documentoId}:
    delete:
      operationId: removerDocumento
      tags: [documentos]
      summary: Remover documento
      description: Remove o registro e apaga o objeto do armazenamento.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: documentoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Documento removido (sem conteúdo)
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/pedido-exames:
    get:
      operationId: obterPedidoExames
      tags: [documentos]
      summary: Obter o pedido de exames da paciente
      description: Metadados do PDF de pedido de exames anexado à paciente (um por paciente). `pedidoExames` é null quando não há.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pedido de exames (ou null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PedidoExamesResposta"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
    delete:
      operationId: removerPedidoExames
      tags: [documentos]
      summary: Remover o pedido de exames
      description: Remove o registro e apaga o objeto do armazenamento (idempotente).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pedido de exames removido (sem conteúdo)
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/receita-preparo-pele:
    get:
      operationId: obterReceitaPreparoPele
      tags: [documentos]
      summary: Obter a receita de preparo da pele da paciente
      description: Metadados do PDF de receita de preparo da pele anexado à paciente (um por paciente). `receitaPreparoPele` é null quando não há.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receita de preparo da pele (ou null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceitaPreparoPeleResposta"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
    delete:
      operationId: removerReceitaPreparoPele
      tags: [documentos]
      summary: Remover a receita de preparo da pele
      description: Remove o registro e apaga o objeto do armazenamento (idempotente).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Receita removida (sem conteúdo)
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/receituario-posop:
    get:
      operationId: obterReceituarioPosop
      tags: [documentos]
      summary: Obter o receituário pós-operatório da paciente
      description: Metadados do PDF de receituário pós-operatório anexado à paciente (um por paciente). `receituarioPosop` é null quando não há.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receituário pós-operatório (ou null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceituarioPosopResposta"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
    delete:
      operationId: removerReceituarioPosop
      tags: [documentos]
      summary: Remover o receituário pós-operatório
      description: Remove o registro e apaga o objeto do armazenamento (idempotente).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Receituário removido (sem conteúdo)
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Erro:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ConflitoCpf:
      type: object
      description: >-
        Resposta 409 do cadastro de paciente. Quando `codigo` é `cpf_arquivado`,
        `pacienteArquivado` traz o resumo do cadastro arquivado encontrado, para
        que a equipe decida restaurá-lo ou criar um novo cadastro.
      properties:
        message:
          type: string
        codigo:
          type: string
          enum: [cpf_ativo, cpf_arquivado]
          description: Tipo do conflito de CPF.
        pacienteArquivado:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PacienteArquivadoResumo"
      required:
        - message
    PacienteArquivadoResumo:
      type: object
      description: Resumo mínimo de um cadastro arquivado, para oferecer a restauração.
      properties:
        id:
          type: integer
        nome:
          type: string
        dataCirurgia:
          type: string
          description: Data da cirurgia do cadastro arquivado (YYYY-MM-DD).
      required:
        - id
        - nome
        - dataCirurgia
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `application/pdf`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    DocumentoPaciente:
      type: object
      description: Metadados de um PDF anexado à paciente (visão do Console). Nunca expõe o caminho interno do objeto.
      properties:
        id:
          type: integer
        rotulo:
          type: string
        nomeArquivo:
          type: string
        contentType:
          type: string
        tamanho:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - rotulo
        - nomeArquivo
        - contentType
        - tamanho
        - createdAt
    DocumentoPublico:
      type: object
      description: Documento exposto na página pública da paciente. Identificado por um token opaco, nunca pelo id interno nem pelo caminho do objeto.
      properties:
        token:
          type: string
          description: Referência pública opaca usada para abrir/baixar o documento.
        rotulo:
          type: string
        nomeArquivo:
          type: string
        tamanho:
          type: integer
      required:
        - token
        - rotulo
        - nomeArquivo
        - tamanho
    PedidoExames:
      type: object
      description: Metadados do PDF de pedido de exames anexado à paciente (visão do Console). Um por paciente. Nunca expõe o caminho interno do objeto.
      properties:
        nomeArquivo:
          type: string
        tamanho:
          type: integer
        createdAt:
          type: string
      required:
        - nomeArquivo
        - tamanho
        - createdAt
    PedidoExamesResposta:
      type: object
      description: Resposta do endpoint de pedido de exames — o registro ou null quando a paciente ainda não tem um.
      properties:
        pedidoExames:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/PedidoExames"
      required:
        - pedidoExames
    PedidoExamesPublico:
      type: object
      description: Pedido de exames exposto na página pública da paciente. Identificado por um token opaco, nunca pelo id interno nem pelo caminho do objeto.
      properties:
        token:
          type: string
          description: Referência pública opaca usada para abrir/baixar o pedido de exames.
        nomeArquivo:
          type: string
        tamanho:
          type: integer
      required:
        - token
        - nomeArquivo
        - tamanho
    ReceitaPreparoPele:
      type: object
      description: Metadados do PDF de receita de preparo da pele anexado à paciente (visão do Console). Um por paciente. Nunca expõe o caminho interno do objeto.
      properties:
        nomeArquivo:
          type: string
        tamanho:
          type: integer
        createdAt:
          type: string
      required:
        - nomeArquivo
        - tamanho
        - createdAt
    ReceitaPreparoPeleResposta:
      type: object
      description: Resposta do endpoint de receita de preparo da pele — o registro ou null quando a paciente ainda não tem uma.
      properties:
        receitaPreparoPele:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/ReceitaPreparoPele"
      required:
        - receitaPreparoPele
    ReceitaPreparoPelePublico:
      type: object
      description: Receita de preparo da pele exposta na página pública da paciente. Identificada por um token opaco, nunca pelo id interno nem pelo caminho do objeto.
      properties:
        token:
          type: string
          description: Referência pública opaca usada para abrir/baixar a receita.
        nomeArquivo:
          type: string
        tamanho:
          type: integer
      required:
        - token
        - nomeArquivo
        - tamanho
    ReceituarioPosop:
      type: object
      description: Metadados do PDF de receituário pós-operatório anexado à paciente (visão do Console). Um por paciente. Nunca expõe o caminho interno do objeto.
      properties:
        nomeArquivo:
          type: string
        tamanho:
          type: integer
        createdAt:
          type: string
      required:
        - nomeArquivo
        - tamanho
        - createdAt
    ReceituarioPosopResposta:
      type: object
      description: Resposta do endpoint de receituário pós-operatório — o registro ou null quando a paciente ainda não tem um.
      properties:
        receituarioPosop:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/ReceituarioPosop"
      required:
        - receituarioPosop
    ReceituarioPosopPublico:
      type: object
      description: Receituário pós-operatório exposto na página pública da paciente. Identificado por um token opaco, nunca pelo id interno nem pelo caminho do objeto.
      properties:
        token:
          type: string
          description: Referência pública opaca usada para abrir/baixar o receituário.
        nomeArquivo:
          type: string
        tamanho:
          type: integer
      required:
        - token
        - nomeArquivo
        - tamanho
    RegistrarDocumentoInput:
      type: object
      description: Registro de um PDF já enviado ao armazenamento via URL pré-assinada.
      properties:
        objectPath:
          type: string
          description: "Caminho do objeto retornado pela URL pré-assinada (ex.: /objects/uploads/uuid)."
        rotulo:
          type: string
          description: 'Rótulo/categoria (ex.: "Pedido médico").'
        nomeArquivo:
          type: string
          description: Nome original do arquivo.
        contentType:
          type: string
          description: MIME type — deve ser application/pdf.
        tamanho:
          type: integer
          description: Tamanho em bytes.
      required:
        - objectPath
        - rotulo
        - nomeArquivo
        - contentType
        - tamanho
    UploadContratoInput:
      type: object
      description: >-
        Registro de um contrato PRONTO (PDF) já enviado ao armazenamento via URL
        pré-assinada, para criar uma geração de upload em rascunho.
      properties:
        tipo:
          $ref: "#/components/schemas/DocumentoTipo"
        objectPath:
          type: string
          description: "Caminho do objeto retornado pela URL pré-assinada (ex.: /objects/uploads/uuid)."
        nomeArquivo:
          type: string
          description: Nome original do arquivo.
        contentType:
          type: string
          description: MIME type — deve ser application/pdf.
        tamanho:
          type: integer
          description: Tamanho em bytes.
        titulo:
          type: string
          description: Título do documento. Ausente = derivado do nome do arquivo.
      required:
        - tipo
        - objectPath
        - nomeArquivo
        - contentType
        - tamanho
    Estagio:
      type: string
      enum:
        - Fechamento
        - Enviado
        - Véspera
        - Cirurgia
    Paciente:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        cpf:
          type: string
          description: CPF da paciente (apenas dígitos, 11).
        telefone:
          type: string
          description: Telefone/WhatsApp da paciente (apenas dígitos, 10 ou 11 com DDD).
        email:
          type: string
          nullable: true
          description: E-mail da paciente (opcional). Puxado do contato do Twenty quando disponível.
        twentyContactId:
          type: string
          nullable: true
          description: Id do contato (People) no Twenty. Quando presente, a ficha está vinculada a uma pessoa REAL do CRM e o nome vem do contato (não editável à mão).
        rg:
          type: string
          nullable: true
          description: RG da paciente (texto livre). Opcional.
        nascimento:
          type: string
          nullable: true
          description: Data de nascimento (texto livre, ex. 15/05/1981). Opcional.
        endereco:
          type: string
          nullable: true
          description: Endereço residencial completo da paciente (texto livre). Opcional.
        procedimentos:
          type: array
          items:
            type: string
        dataCirurgia:
          type: string
          description: Data da cirurgia (YYYY-MM-DD)
        horario:
          type: string
        valorSinal:
          type: number
          description: Valor já pago pela paciente.
        valorPendente:
          type: number
          description: Saldo em aberto (0 quando quitado).
        dataPagamentoPendente:
          type: string
          nullable: true
          description: Data prevista do pagamento pendente (YYYY-MM-DD); null quando quitado.
        laser:
          type: boolean
        medica:
          type: string
        crm:
          type: string
        rqe:
          type: string
        clinica:
          type: string
        local:
          type: string
        localEndereco:
          type: string
          nullable: true
        equipeAnestesia:
          type: string
        equipeAnestesiaTelefone:
          type: string
          nullable: true
          description: Telefone da equipe de anestesia (texto livre). null quando não informado.
        estagio:
          $ref: "#/components/schemas/Estagio"
        vendedoraId:
          type: ["integer", "null"]
        vendedoraNome:
          type: ["string", "null"]
        arquivado:
          type: boolean
        tokenPublico:
          type: string
        contratoAutentiqueId:
          type: string
          nullable: true
          description: ID do documento na Autentique vinculado ao processo (null quando sem contrato).
        contratoStatus:
          type: string
          nullable: true
          enum:
            - assinado
            - pendente
            - recusado
            - indisponivel
          description: Último status conhecido do contrato (null quando sem link salvo).
        contratoAssinadoEm:
          type: string
          nullable: true
          description: Data ISO da assinatura quando o contrato está assinado.
        contratoVerificadoEm:
          type: string
          nullable: true
          description: Data ISO da última verificação do status na Autentique.
        medicoId:
          type: ["integer", "null"]
          description: Médico que atende a paciente (null quando nenhum vinculado).
        contratoLinkAssinatura:
          type: string
          nullable: true
          description: Link de assinatura do contrato a usar (override manual quando houver; senão o cache do link da Autentique). null quando assinado/sem link.
        contratoLinkAssinaturaManual:
          type: string
          nullable: true
          description: Override manual do link de assinatura colado pela secretária; tem prioridade sobre o link automático.
        contratoPrazoOverride:
          type: string
          nullable: true
          description: Prazo de assinatura definido manualmente para esta paciente (YYYY-MM-DD); quando null, usa dataCirurgia − prazo padrão.
        contratoPrazo:
          type: string
          nullable: true
          description: Prazo de assinatura já calculado (YYYY-MM-DD); override quando houver, senão dataCirurgia − prazo padrão. null quando não há base para calcular.
        termoAutentiqueId:
          type: string
          nullable: true
          description: ID do documento do termo de consentimento na Autentique (null quando sem termo).
        termoStatus:
          type: string
          nullable: true
          enum:
            - assinado
            - pendente
            - recusado
            - indisponivel
          description: Último status conhecido do termo de consentimento (null quando sem link salvo).
        termoAssinadoEm:
          type: string
          nullable: true
          description: Data ISO da assinatura quando o termo está assinado.
        termoVerificadoEm:
          type: string
          nullable: true
          description: Data ISO da última verificação do status do termo na Autentique.
        termoLinkAssinatura:
          type: string
          nullable: true
          description: Link de assinatura do termo a usar (override manual quando houver; senão o cache da Autentique). null quando assinado/sem link.
        termoLinkAssinaturaManual:
          type: string
          nullable: true
          description: Override manual do link de assinatura do termo; tem prioridade sobre o link automático.
        termoPrazoOverride:
          type: string
          nullable: true
          description: Prazo de assinatura definido manualmente para o termo desta paciente (YYYY-MM-DD).
        termoPrazo:
          type: string
          nullable: true
          description: Prazo de assinatura do termo já calculado (YYYY-MM-DD). null quando não há base para calcular.
        codigoPublico:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        tema:
          type: ["string", "null"]
          enum: [light, dark, null]
          description: Preferência de tema (claro/escuro) escolhida pela paciente na página pública (null quando nunca escolheu → cai no padrão claro).
        marcoAtual:
          type: ["string", "null"]
          enum: [contrato_pagamento, link_enviado, termo_assinado, menos_48h_cirurgia, cirurgia, retirada_pontos, retorno_1, retorno_2, retorno_3, null]
          description: Marco mais avançado já atingido na jornada interna da equipe; null quando nenhum (aguardando contrato). Derivado no servidor a partir dos sinais do processo. O funil não passa de contrato_pagamento enquanto o contrato não está assinado por todas as partes.
        marcoAtualRotulo:
          type: string
          description: Rótulo legível do marco atual (por exemplo, Contrato & Pagamento); Aguardando contrato no baseline.
        marcoAtualIndice:
          type: integer
          minimum: 0
          maximum: 9
          description: Posição do marco atual (1..9); 0 quando nenhum marco foi atingido (aguardando contrato).
        marcosConcluidos:
          type: array
          items:
            $ref: "#/components/schemas/MarcoJornadaEquipe"
          description: Marcos individualmente cumpridos (para um render honesto de cada nó do funil, já que marcos automáticos podem ficar "em falha").
        linkEnviadoEm:
          type: ["string", "null"]
          description: Data/hora ISO em que o link foi enviado à paciente (handoff aprovado). null quando ainda não enviado.
        retiradaPontosEm:
          type: ["string", "null"]
          description: Data/hora ISO em que a retirada de pontos foi marcada manualmente pela equipe. null quando não marcada.
        retorno1Em:
          type: ["string", "null"]
          description: Data/hora ISO do 1º retorno (marcado manualmente). null quando não marcado.
        retorno2Em:
          type: ["string", "null"]
          description: Data/hora ISO do 2º retorno (marcado manualmente). null quando não marcado.
        retorno3Em:
          type: ["string", "null"]
          description: Data/hora ISO do 3º retorno (marcado manualmente). null quando não marcado.
        abriu:
          type: boolean
          description: Indica se a paciente já abriu o link ao menos uma vez. Presente apenas na listagem (agregado); ausente no detalhe.
        lembreteEnviadoEm:
          type: ["string", "null"]
          description: Data/hora ISO do último lembrete enviado pela equipe via WhatsApp à paciente que ainda não abriu o link. Presente apenas na listagem; null quando nenhum lembrete foi registrado.
        lembradoPor:
          type: ["string", "null"]
          description: Nome do membro da equipe que enviou o último lembrete por WhatsApp. Presente apenas na listagem; null quando nenhum lembrete foi registrado ou o autor não foi capturado.
      required:
        - id
        - nome
        - cpf
        - telefone
        - procedimentos
        - dataCirurgia
        - horario
        - valorSinal
        - valorPendente
        - dataPagamentoPendente
        - laser
        - medica
        - crm
