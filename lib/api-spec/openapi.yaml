        contratoStatus:
          type: ["string", "null"]
          enum: [assinado, pendente, recusado, indisponivel, null]
          description: Último status conhecido do contrato (null quando sem contrato vinculado). A paciente só pode ver/baixar quando "assinado".
        contratoAssinadoEm:
          type: ["string", "null"]
          description: Data ISO da assinatura quando o contrato está assinado.
        medicoFotoUrl:
          type: ["string", "null"]
          description: URL assinada (temporária) da foto do médico que atende a paciente; null quando sem foto/médico.
        medicoLogoUrl:
          type: ["string", "null"]
          description: URL assinada (temporária) do logo/marca do médico; null quando sem logo/médico.
        contratoLinkAssinatura:
          type: ["string", "null"]
          description: Link para a paciente assinar o contrato (quando pendente). null quando assinado/sem link.
        contratoPrazo:
          type: ["string", "null"]
          description: Prazo de assinatura do contrato (YYYY-MM-DD), para o aviso na página. null quando não há base para calcular.
        termoStatus:
          type: ["string", "null"]
          enum: [assinado, pendente, recusado, indisponivel, null]
          description: Último status conhecido do termo de consentimento (null quando sem termo vinculado).
        termoAssinadoEm:
          type: ["string", "null"]
          description: Data ISO da assinatura do termo quando assinado.
        termoLinkAssinatura:
          type: ["string", "null"]
          description: Link para a paciente assinar o termo (quando pendente). null quando assinado/sem link.
        termoPrazo:
          type: ["string", "null"]
          description: Prazo de assinatura do termo (YYYY-MM-DD). null quando não há base para calcular.
        tema:
