    PacienteCreate:
      type: object
      properties:
        nome:
          type: string
        cpf:
          type: string
          pattern: '^(\d{11})?$'
          description: CPF da paciente (apenas dígitos, 11) — OPCIONAL; vazio quando ainda não se tem o CPF.
        telefone:
          type: string
          pattern: '^\d{10,11}$'
          description: Telefone/WhatsApp (apenas dígitos, 10 ou 11 com DDD).
        procedimentos:
          type: array
          items:
            type: string
          minItems: 1
        dataCirurgia:
          type: string
          description: Data da cirurgia (YYYY-MM-DD)
        horario:
          type: string
          default: "06:00"
        valorSinal:
          type: number
          description: Valor já pago pela paciente.
        valorPendente:
          type: number
          default: 0
          description: Saldo em aberto (0 quando quitado).
        dataPagamentoPendente:
          type: string
          nullable: true
          description: Data prevista do pagamento pendente (YYYY-MM-DD).
        laser:
          type: boolean
          default: false
        local:
          type: string
          default: Avant Moema
          description: Hospital/local da cirurgia (texto livre).
        localEndereco:
          type: string
          nullable: true
          description: Endereço do local da cirurgia (texto livre, opcional).
        equipeAnestesia:
          type: string
          default: Zenicare
        equipeAnestesiaTelefone:
          type: string
          nullable: true
          description: Telefone da equipe de anestesia (texto livre, opcional).
        vendedoraId:
          type: ["integer", "null"]
        medicoId:
          type: ["integer", "null"]
          description: Médico que atende a paciente. Quando omitido, usa o médico padrão.
        email:
          type: string
          nullable: true
          description: E-mail da paciente (opcional). Puxado do contato do Twenty quando disponível; habilita entrega de assinatura por e-mail.
        twentyContactId:
          type: string
          nullable: true
          description: Id do contato (People) no Twenty. Vincula a ficha a uma pessoa REAL do CRM quando cadastrada a partir da busca.
        rg:
          type: string
          nullable: true
          description: RG da paciente (texto livre). Opcional.
        nascimento:
          type: string
          nullable: true
          description: Data de nascimento (texto livre, ex. 15/05/1981). Opcional.
        endereco:
          type: string
          nullable: true
          description: Endereço residencial completo da paciente (texto livre). Opcional.
        permitirCpfArquivado:
          type: boolean
          default: false
          description: >-
            Quando true, autoriza criar um novo cadastro mesmo que exista um
            cadastro ARQUIVADO com o mesmo CPF (paciente que voltou para um novo
            procedimento). Não afeta o bloqueio contra cadastros ativos.
      required:
        - nome
        - telefone
        - procedimentos
        - dataCirurgia
        - valorSinal
    PacienteUpdate:
