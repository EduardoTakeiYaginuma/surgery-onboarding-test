        equipeAnestesia:
          type: ["string", "null"]
          description: Nome da equipe de anestesia vinculada à cirurgia (null quando não configurado).
        equipeAnestesiaTelefone:
          type: ["string", "null"]
          description: Telefone da equipe de anestesia exibido na página da paciente (null quando não informado).
      required:
        - primeiroNome
        - nome
        - medica
        - crm
        - rqe
        - clinica
        - especialidade
        - procedimentos
        - dataCirurgia
        - horario
        - local
        - enderecoLocal
        - laser
        - pagamento
        - prazoDocumentos
        - secoes
        - documentos
        - pedidoExames
        - receitaPreparoPele
        - receituarioPosop
        - contratoStatus
        - contratoAssinadoEm
        - medicoFotoUrl
        - medicoLogoUrl
        - contratoLinkAssinatura
        - contratoPrazo
        - termoStatus
        - termoAssinadoEm
        - termoLinkAssinatura
        - termoPrazo
        - tema
        - temaPadrao
        - equipeAnestesia
        - equipeAnestesiaTelefone
    TemaPaciente:
