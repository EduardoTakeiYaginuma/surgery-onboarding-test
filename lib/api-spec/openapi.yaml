openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pacientes
    description: Gestão de pacientes (Console da Thalita)
  - name: vendedoras
    description: Lista fixa de vendedoras responsáveis
  - name: publico
    description: Página pública da paciente (acesso por token)
  - name: conteudo
    description: Conteúdo editável da página pública (padrão global e override por paciente)
  - name: documentos
    description: PDFs (pedidos médicos etc.) anexados à paciente
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /pacientes:
    get:
      operationId: listarPacientes
      tags: [pacientes]
      summary: Listar pacientes
      description: Lista todos os pacientes para o Console.
      responses:
        "200":
          description: Lista de pacientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Paciente"
    post:
      operationId: criarPaciente
      tags: [pacientes]
      summary: Criar paciente
      description: Cria um novo paciente no estágio Fechamento e gera o token público.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PacienteCreate"
      responses:
        "201":
          description: Paciente criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PacienteDetalhe"
        "409":
          description: >-
            CPF em conflito. Quando `codigo` é `cpf_arquivado`, existe um
            cadastro arquivado com o mesmo CPF e o cliente pode restaurá-lo ou
            reenviar com `permitirCpfArquivado: true`. Caso contrário o CPF já
            pertence a um cadastro ativo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflitoCpf"
  /pacientes/resumo:
    get:
      operationId: resumoPacientes
      tags: [pacientes]
      summary: Resumo do Console
      description: Contagens por estágio e total de pacientes para o painel do Console.
      responses:
        "200":
          description: Resumo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumoConsole"
  /config:
    get:
      operationId: obterConfig
      tags: [pacientes]
      summary: Configuração operacional
      description: Lista de hospitais e equipes de anestesia para os seletores, mais o registro padrão das páginas de paciente.
      responses:
        "200":
          description: Configuração
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigOperacional"
  /config/tema-padrao:
    put:
      operationId: definirTemaPadrao
      tags: [pacientes]
      summary: Definir o registro padrão das páginas de paciente
      description: Define o registro (claro/escuro) com que novas páginas de paciente abrem no primeiro acesso. Não altera a escolha já feita por uma paciente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemaPadrao"
      responses:
        "200":
          description: Registro padrão salvo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemaPadrao"
  /config/notificacoes:
    get:
      operationId: obterConfigNotificacao
      tags: [pacientes]
      summary: Configuração dos avisos de contrato à equipe
      description: Destino do aviso e o liga/desliga (silenciada) que a equipe definiu no Console.
      responses:
        "200":
          description: Configuração de avisos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigNotificacao"
    put:
      operationId: definirConfigNotificacao
      tags: [pacientes]
      summary: Definir os avisos de contrato à equipe
      description: Define o destino do aviso (webhook) e liga/desliga os avisos, sem mexer em secrets. Silenciar não perde o destino salvo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigNotificacao"
      responses:
        "200":
          description: Configuração de avisos salva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigNotificacao"
        "400":
          description: Destino inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /config/notificacoes/testar:
    post:
      operationId: testarConfigNotificacao
      tags: [pacientes]
      summary: Enviar um aviso de teste ao destino
      description: >-
        Dispara uma mensagem de teste para o destino, confirmando na hora se ele
        funciona. Usa o destino recém-digitado (webhookUrl no corpo), quando
        informado; senão cai no destino salvo. Ignora o liga/desliga: o teste
        vale mesmo com os avisos pausados.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestarNotificacaoBody"
      responses:
        "200":
          description: Resultado do envio de teste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoTesteNotificacao"
        "400":
          description: Destino inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /config/contrato:
    get:
      operationId: obterConfigContrato
      tags: [pacientes]
      summary: Configuração do prazo de assinatura do contrato
      description: Quantos dias antes da cirurgia o contrato deve estar assinado (padrão da clínica).
      responses:
        "200":
          description: Configuração do prazo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigContrato"
    put:
      operationId: definirConfigContrato
      tags: [pacientes]
      summary: Definir o prazo padrão de assinatura do contrato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigContrato"
      responses:
        "200":
          description: Configuração do prazo salva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigContrato"
        "400":
          description: Valor inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /config/documento-prompts:
    get:
      operationId: obterConfigPrompts
      tags: [pacientes]
      summary: Prompts da geração de documentos por IA
      description: Devolve os prompts de contrato, termo e refino (texto efetivo + padrão de código + tokens).
      responses:
        "200":
          description: Prompts configurados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigPrompts"
    put:
      operationId: definirConfigPrompts
      tags: [pacientes]
      summary: Editar os prompts da geração por IA
      description: Salva o texto de um ou mais prompts. Em cada campo, null restaura o padrão e ausente não mexe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPromptsInput"
      responses:
        "200":
          description: Prompts salvos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigPrompts"
        "400":
          description: Prompt inválido (texto curto ou token obrigatório ausente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contratos/alertas/processar:
    post:
      operationId: processarAlertasPrazo
      tags: [pacientes]
      summary: Processar alertas de prazo do contrato
      description: Varre os pacientes ativos e avisa a equipe quando o prazo de assinatura venceu e o contrato não foi assinado. Dedup por paciente. Chamado pelo Console ao carregar a home.
      responses:
        "200":
          description: Resultado da varredura
          content:
            application/json:
              schema:
                type: object
                properties:
                  avisados:
                    type: integer
                required:
                  - avisados
  /contrato-modelos:
    get:
      operationId: listarContratoModelos
      tags: [contratos]
      summary: Listar modelos-base de contrato
      description: Lista os modelos-base por (tipo, procedimento). Semeia os padrões faltantes (idempotente, não sobrescreve). Filtra por `tipo` quando informado.
      parameters:
        - name: tipo
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentoTipo"
      responses:
        "200":
          description: Lista de modelos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContratoModelo"
    post:
      operationId: criarContratoModelo
      tags: [contratos]
      summary: Criar modelo-base de contrato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContratoModeloCreate"
      responses:
        "201":
          description: Modelo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoModelo"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Já existe um modelo para este procedimento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contrato-modelos/variaveis:
    get:
      operationId: listarVariaveisContrato
      tags: [contratos]
      summary: Catálogo de variáveis dos modelos de contrato
      description: Variáveis {{...}} disponíveis para usar no corpo dos modelos.
      responses:
        "200":
          description: Catálogo de variáveis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariavelContrato"
  /contrato-modelos/importar:
    post:
      operationId: importarContratoModelo
      tags: [contratos]
      summary: Importar modelo da clínica (Word/PDF) → HTML
      description: >-
        Converte um arquivo Word (.docx) ou PDF — já enviado ao armazenamento via
        URL pré-assinada — no corpo HTML de um modelo-base. Retorna o HTML e um
        título sugerido a partir do nome do arquivo; a equipe revisa, insere as
        {{variáveis}}, define o procedimento e salva como qualquer outro
        modelo-base. PDFs escaneados (sem texto) são recusados com 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContratoModeloImportarInput"
      responses:
        "200":
          description: Arquivo convertido em HTML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoModeloImportado"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "422":
          description: Arquivo não suportado, vazio ou ilegível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contrato-modelos/{id}:
    put:
      operationId: atualizarContratoModelo
      tags: [contratos]
      summary: Atualizar modelo-base de contrato
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContratoModeloUpdate"
      responses:
        "200":
          description: Modelo atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoModelo"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
    delete:
      operationId: removerContratoModelo
      tags: [contratos]
      summary: Remover modelo-base de contrato
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removido
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contrato-modelos/{id}/restaurar-padrao:
    post:
      operationId: restaurarContratoModeloPadrao
      tags: [contratos]
      summary: Restaurar modelo ao texto de fábrica
      description: >-
        Restaura o corpo/título do modelo ao texto de fábrica atual, deixando-o
        NÃO vigente (a equipe revisa e marca como vigente antes de qualquer
        envio). Se o modelo está vigente ou foi editado, exige `confirmar=true`;
        caso contrário responde 409 para evitar sobrescrever o trabalho da
        equipe sem confirmação explícita.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContratoModeloRestaurarPadrao"
      responses:
        "200":
          description: Modelo restaurado ao texto de fábrica (não vigente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoModelo"
        "404":
          description: Modelo não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Restauração exige confirmação (modelo vigente ou editado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "422":
          description: Procedimento criado manualmente, sem texto de fábrica
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos:
    get:
      operationId: listarContratosGeracao
      tags: [contratos]
      summary: Listar gerações de documento da paciente
      description: Lista todas as gerações da paciente (contrato e termo). Cada item carrega `tipo`; o cliente separa por tipo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gerações de contrato (mais recente primeiro)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContratoGeracao"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/documento-contexto:
    get:
      operationId: obterDocumentoContexto
      tags: [contratos]
      summary: Ficha de inputs do documento (dados que preenchem o modelo)
      description: Retorna os dados da paciente já resolvidos e formatados (exatamente como entram no texto), agrupados em Paciente, Procedimento e Valores. O grupo de Valores só se aplica ao contrato; o cliente o oculta para o termo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ficha de inputs agrupada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentoContextoGrupo"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos/previa:
    post:
      operationId: preverContrato
      tags: [contratos]
      summary: Prévia ao vivo do documento (sem gerar/persistir)
      description: >-
        Resolve o modelo-base vigente para a paciente e devolve o corpo pronto —
        para a prévia antes de gerar o rascunho. Aceita OVERRIDES (os valores que
        a equipe está editando na ficha, ainda não salvos) que são aplicados por
        cima dos dados salvos apenas nesta resolução, sem persistir nada.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviaContratoInput"
      responses:
        "200":
          description: Prévia resolvida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviaContrato"
        "400":
          description: Não há modelo-base vigente para o tipo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos/revisar-previa:
    post:
      operationId: revisarPreviaContrato
      tags: [contratos]
      summary: Feedback de IA sobre o texto ANTES de gerar (opcional, não bloqueia)
      description: >-
        Envia o corpo em edição para a revisão jurídica assistida por IA e devolve
        o relatório. É apoio à decisão — não persiste nada e nunca impede a geração.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisarPreviaInput"
      responses:
        "200":
          description: Relatório da revisão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatorioRevisao"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: A revisão por IA falhou (tente novamente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos/gerar:
    post:
      operationId: gerarContrato
      tags: [contratos]
      summary: Gerar um rascunho de contrato para a paciente
      description: Preenche o modelo-base vigente com os dados da paciente e cria uma geração em rascunho. Não envia nada à Autentique.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GerarContratoInput"
      responses:
        "201":
          description: Rascunho criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Dados inválidos ou modelo não vigente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Paciente ou modelo não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos/upload:
    post:
      operationId: uploadContrato
      tags: [contratos]
      summary: Registrar um contrato PRONTO enviado por fora (PDF)
      description: >-
        Registra um PDF já enviado ao armazenamento (via URL pré-assinada) como
        uma geração de contrato em rascunho, sem passar pela pré-geração. O PDF é
        a fonte da verdade — segue direto para aprovação e envio à Autentique.
        Só aceita PDF e impõe um limite de tamanho.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadContratoInput"
      responses:
        "201":
          description: Rascunho de upload criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Arquivo inválido (não é PDF, muito grande ou caminho inválido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /pacientes/{id}/contratos/gerar-ia:
    post:
      operationId: gerarIaDocumento
      tags: [contratos]
      summary: Gerar um documento (contrato/termo) redigido por IA
      description: >-
        Redige um documento a partir do formulário, seguindo o padrão dos
        documentos-exemplo da clínica (ChatGPT). Cria uma geração em rascunho com o
        corpo HTML devolvido pela IA. Não envia nada à Autentique.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GerarIaInput"
      responses:
        "201":
          description: Rascunho redigido por IA criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha na geração por IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contratos/{id}/refinar-ia:
    post:
      operationId: refinarIaDocumento
      tags: [contratos]
      summary: Refinar por IA um documento gerado (aplicar uma alteração)
      description: >-
        Aplica uma instrução de alteração ao corpo de uma geração redigida por IA
        (origem "ia") ainda em rascunho, preservando o restante do documento.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefinarIaInput"
      responses:
        "200":
          description: Documento refinado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Geração não é de IA, não está em rascunho, ou instrução inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha no refino por IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contratos/{id}:
    put:
      operationId: editarContratoGeracao
      tags: [contratos]
      summary: Editar o texto de um rascunho de contrato
      description: Só permitido enquanto a geração está em rascunho.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditarContratoBody"
      responses:
        "200":
          description: Rascunho atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContratoGeracao"
        "400":
          description: Geração não está mais editável
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /contratos/{id}/decisoes:
    put:
      operationId: definirDecisoesContrato
      tags: [contratos]
      summary: Confirmar/ajustar as decisões do motor de cláusulas
      description: >-
        Aplica as escolhas do operador (variantes/opcionais/gênero) e REGERA o
        corpo do rascunho de forma determinística a partir do modelo-base.
        Descarta ajustes manuais de texto — use antes de refinar o texto à mão.
        Só permitido enquanto a geração está em rascunho.
