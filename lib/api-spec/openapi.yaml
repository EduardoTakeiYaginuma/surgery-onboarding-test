          description: Pedido de exames (PDF) da paciente, exibido na seção de procedimentos pré-operatórios. null quando não há.
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/PedidoExamesPublico"
        receitaPreparoPele:
          description: Receita de preparo da pele (PDF) da paciente, exibida na seção de preparo da pele. null quando não há.
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/ReceitaPreparoPelePublico"
        receituarioPosop:
          description: Receituário pós-operatório (PDF) da paciente, exibido na seção de receituário. null quando não há.
          nullable: true
